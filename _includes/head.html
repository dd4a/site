<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: "Digital Design 4 All" }}</title>
  <meta name="description" content="{{ page.description | default: "Accessibility consulting: audits, remediation guidance, accessibility programs, and training." }}">
  <meta name="theme-color" content="#102070">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css">

  <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/img/apple-touch-icon.png">
  <link rel="manifest" href="{{ site.baseurl }}/site.webmanifest">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url | replace: 'index.html', '' }}">

  <meta property="og:title" content="{{ page.og_title | default: (page.title | default: 'Digital Design 4 All') }}">
  <meta property="og:description" content="{{ page.og_description | default: (page.description | default: 'Accessibility consulting: audits, remediation guidance, accessibility programs, and training.') }}">
  <meta property="og:type" content="website">
{% if page.og_image %}
  <meta property="og:image" content="{{ page.og_image }}">
{% else %}
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/og-card.png">
{% endif %}
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url | replace: 'index.html', '' }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.og_title | default: (page.title | default: 'Digital Design 4 All') }}">
  <meta name="twitter:description" content="{{ page.og_description | default: page.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/og-card.png">

  <!-- CSP enforced via Cloudflare Transform Rule header -->

{% if page.noindex == true %}
  <meta name="robots" content="noindex">
{% endif %}
</head>
